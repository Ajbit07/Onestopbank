version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: bankingportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bankingportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - banking-network

networks:
  banking-network:
    driver: bridge
